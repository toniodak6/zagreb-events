name: Daily Zagreb Events Scraper
 
on:
  schedule:
    # Runs every day at 07:00 UTC (09:00 Zagreb time in summer, 08:00 in winter)
    - cron: '0 7 * * *'
  workflow_dispatch:
    # Allows you to run this manually from GitHub whenever you want
 
jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push events.json back to the repo
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml
 
      - name: Run scraper
        run: python scraper.py
 
      - name: Commit and push updated events.json
        run: |
          git config --global user.name "Zagreb Events Bot"
          git config --global user.email "bot@zagreb-events"
          git add events.json
          git diff --staged --quiet || git commit -m "🗓️ Daily events update — $(date +'%Y-%m-%d')"
          git push
